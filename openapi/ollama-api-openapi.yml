openapi: 3.1.0
info:
  title: Ollama API
  description: >-
    Ollama provides a REST API for running and managing large language models
    locally. The API supports text generation, chat completions, embeddings,
    model management, and streaming responses. It serves as the primary
    interface for interacting with models running on the Ollama inference
    engine at localhost:11434.
  version: '0.1.0'
  contact:
    name: Ollama Team
    url: https://ollama.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://ollama.com/terms

externalDocs:
  description: Ollama API Documentation
  url: https://docs.ollama.com/api/introduction

servers:
  - url: http://localhost:11434
    description: Local Ollama Server

tags:
  - name: Generate
    description: >-
      Generate text completions from a prompt using a specified model.
  - name: Chat
    description: >-
      Generate chat completions with multi-turn conversation support.
  - name: Embeddings
    description: >-
      Generate vector embeddings from text input.
  - name: Models
    description: >-
      List, show, create, copy, pull, push, and delete models.
  - name: Running Models
    description: >-
      View models currently loaded in memory and their resource usage.
  - name: Blobs
    description: >-
      Manage binary large objects used by models.
  - name: Version
    description: >-
      Retrieve the Ollama server version.

paths:
  /api/generate:
    post:
      operationId: generateCompletion
      summary: Generate a completion
      description: >-
        Generate a response for a given prompt with a provided model. This is a
        streaming endpoint that returns a sequence of JSON objects by default.
        The final response object includes statistics about the generation. Set
        stream to false to receive a single response object.
      tags:
        - Generate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
      responses:
        '200':
          description: >-
            Successful generation response. Returns a stream of JSON objects
            when streaming is enabled, or a single JSON object when disabled.
          content:
            application/x-ndjson:
              schema:
                $ref: '#/components/schemas/GenerateResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Model not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/chat:
    post:
      operationId: generateChatCompletion
      summary: Generate a chat completion
      description: >-
        Generate the next message in a chat with a provided model. This is a
        streaming endpoint that returns a sequence of JSON objects by default.
        Supports multi-turn conversations, tool calling, vision input, and
        structured output.
      tags:
        - Chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: >-
            Successful chat response. Returns a stream of JSON objects when
            streaming is enabled, or a single JSON object when disabled.
          content:
            application/x-ndjson:
              schema:
                $ref: '#/components/schemas/ChatResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Model not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/embed:
    post:
      operationId: generateEmbeddings
      summary: Generate embeddings
      description: >-
        Generate vector embeddings from a model for a given text input or
        array of text inputs. Useful for semantic search, clustering, and
        retrieval augmented generation.
      tags:
        - Embeddings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmbedRequest'
      responses:
        '200':
          description: Successful embeddings response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmbedResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Model not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/tags:
    get:
      operationId: listModels
      summary: List local models
      description: >-
        List all models that are available locally on the Ollama server,
        including their size, digest, and metadata details.
      tags:
        - Models
      responses:
        '200':
          description: Successful response with list of models
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'

  /api/show:
    post:
      operationId: showModelInfo
      summary: Show model information
      description: >-
        Show detailed information about a model including parameters, template,
        license, system prompt, capabilities, and model metadata.
      tags:
        - Models
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShowRequest'
      responses:
        '200':
          description: Successful response with model details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowResponse'
        '404':
          description: Model not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/create:
    post:
      operationId: createModel
      summary: Create a model
      description: >-
        Create a model from an existing model with optional customizations
        including system prompt, template, parameters, and quantization.
        Streams progress updates by default.
      tags:
        - Models
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequest'
      responses:
        '200':
          description: >-
            Model creation progress. Returns a stream of status events when
            streaming is enabled, or a single status response when disabled.
          content:
            application/x-ndjson:
              schema:
                $ref: '#/components/schemas/StatusEvent'
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/copy:
    post:
      operationId: copyModel
      summary: Copy a model
      description: >-
        Create a copy of an existing model under a new name. This creates
        a duplicate that can be modified independently.
      tags:
        - Models
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CopyRequest'
      responses:
        '200':
          description: Model successfully copied
        '404':
          description: Source model not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/pull:
    post:
      operationId: pullModel
      summary: Pull a model
      description: >-
        Download a model from the Ollama model registry. Streams progress
        updates by default with status, digest, and byte transfer information.
      tags:
        - Models
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PullRequest'
      responses:
        '200':
          description: >-
            Model download progress. Returns a stream of status events when
            streaming is enabled, or a single status response when disabled.
          content:
            application/x-ndjson:
              schema:
                $ref: '#/components/schemas/StatusEvent'
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/push:
    post:
      operationId: pushModel
      summary: Push a model
      description: >-
        Upload a model to the Ollama model registry for sharing. Requires
        authentication. Streams progress updates by default.
      tags:
        - Models
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PushRequest'
      responses:
        '200':
          description: >-
            Model upload progress. Returns a stream of status events when
            streaming is enabled, or a single status response when disabled.
          content:
            application/x-ndjson:
              schema:
                $ref: '#/components/schemas/StatusEvent'
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/delete:
    delete:
      operationId: deleteModel
      summary: Delete a model
      description: >-
        Delete a model and its data from the local Ollama server. This
        permanently removes the model files from disk.
      tags:
        - Models
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteRequest'
      responses:
        '200':
          description: Model successfully deleted
        '404':
          description: Model not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/ps:
    get:
      operationId: listRunningModels
      summary: List running models
      description: >-
        List models that are currently loaded into memory on the Ollama
        server, including their VRAM usage, context length, and expiration
        time.
      tags:
        - Running Models
      responses:
        '200':
          description: Successful response with list of running models
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PsResponse'

  /api/blobs/{digest}:
    head:
      operationId: checkBlob
      summary: Check if a blob exists
      description: >-
        Check if a blob with the specified digest exists on the server.
        Returns 200 if it exists, 404 if it does not.
      tags:
        - Blobs
      parameters:
        - $ref: '#/components/parameters/BlobDigest'
      responses:
        '200':
          description: Blob exists
        '404':
          description: Blob not found
    post:
      operationId: createBlob
      summary: Create a blob
      description: >-
        Create a blob from a file on the server. Used to upload model
        layers or other binary data referenced by digest.
      tags:
        - Blobs
      parameters:
        - $ref: '#/components/parameters/BlobDigest'
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: Blob created successfully
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/version:
    get:
      operationId: getVersion
      summary: Get Ollama version
      description: >-
        Returns the version of the Ollama server.
      tags:
        - Version
      responses:
        '200':
          description: Successful response with version string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'

components:
  parameters:
    BlobDigest:
      name: digest
      in: path
      required: true
      description: >-
        The SHA256 digest of the blob in the format sha256:<hex>.
      schema:
        type: string
        pattern: '^sha256:[a-f0-9]{64}$'

  schemas:
    GenerateRequest:
      type: object
      description: >-
        Request body for generating a text completion from a prompt.
      required:
        - model
      properties:
        model:
          type: string
          description: >-
            The name of the model to use for generation.
        prompt:
          type: string
          description: >-
            The text prompt to generate a response from.
        suffix:
          type: string
          description: >-
            Text that appears after the model response, used for
            fill-in-the-middle generation.
        images:
          type: array
          description: >-
            A list of base64-encoded images for multimodal models that
            support vision input.
          items:
            type: string
            format: byte
        format:
          description: >-
            The format to return a response in. Accepts the string json
            for simple JSON mode, or a JSON Schema object for structured
            output.
          oneOf:
            - type: string
              enum:
                - json
            - type: object
        system:
          type: string
          description: >-
            System message to set the behavior and context of the model.
        stream:
          type: boolean
          description: >-
            When true, returns a stream of partial responses as
            newline-delimited JSON. When false, returns a single response
            object.
          default: true
        think:
          description: >-
            When true, returns separate thinking output in addition to
            the generated content. Can also be set to a string value of
            high, medium, or low to control thinking verbosity.
          oneOf:
            - type: boolean
            - type: string
              enum:
                - high
                - medium
                - low
        raw:
          type: boolean
          description: >-
            When true, returns the raw response from the model without
            applying prompt templating.
          default: false
        keep_alive:
          description: >-
            How long the model stays loaded in memory after the request.
            Accepts a duration string like 5m or a number of seconds.
            Set to 0 to unload immediately after use.
          oneOf:
            - type: string
            - type: number
        options:
          $ref: '#/components/schemas/ModelOptions'
        logprobs:
          type: boolean
          description: >-
            Whether to return log probabilities of the output tokens.
        top_logprobs:
          type: integer
          description: >-
            Number of most likely tokens to return at each token
            position, along with their log probabilities.
          minimum: 0

    GenerateResponse:
      type: object
      description: >-
        Response object from a text generation request. When streaming,
        partial objects are returned until done is true.
      properties:
        model:
          type: string
          description: >-
            The model that generated the response.
        created_at:
          type: string
          format: date-time
          description: >-
            The ISO 8601 timestamp when the response was created.
        response:
          type: string
          description: >-
            The generated text response. In streaming mode, contains the
            partial response for each chunk.
        thinking:
          type: string
          description: >-
            The model's thinking output when think is enabled.
        done:
          type: boolean
          description: >-
            Indicates whether the generation has completed. The final
            response in a stream has done set to true.
        done_reason:
          type: string
          description: >-
            The reason the generation stopped. Common values include
            stop and length.
        total_duration:
          type: integer
          description: >-
            Total time spent generating the response in nanoseconds.
        load_duration:
          type: integer
          description: >-
            Time spent loading the model in nanoseconds.
        prompt_eval_count:
          type: integer
          description: >-
            Number of tokens in the prompt that were evaluated.
        prompt_eval_duration:
          type: integer
          description: >-
            Time spent evaluating the prompt in nanoseconds.
        eval_count:
          type: integer
          description: >-
            Number of tokens generated in the response.
        eval_duration:
          type: integer
          description: >-
            Time spent generating output tokens in nanoseconds.
        logprobs:
          type: array
          description: >-
            Log probability information for generated tokens when
            logprobs is enabled.
          items:
            $ref: '#/components/schemas/Logprob'

    ChatRequest:
      type: object
      description: >-
        Request body for generating a chat completion from a conversation.
      required:
        - model
        - messages
      properties:
        model:
          type: string
          description: >-
            The name of the model to use for chat completion.
        messages:
          type: array
          description: >-
            The messages of the chat conversation. Each message has a
            role and content, with optional images and tool calls.
          items:
            $ref: '#/components/schemas/ChatMessage'
        tools:
          type: array
          description: >-
            A list of tool definitions that the model may call during
            the conversation for function calling.
          items:
            $ref: '#/components/schemas/ToolDefinition'
        format:
          description: >-
            The format to return a response in. Accepts the string json
            for simple JSON mode, or a JSON Schema object for structured
            output.
          oneOf:
            - type: string
              enum:
                - json
            - type: object
        stream:
          type: boolean
          description: >-
            When true, returns a stream of partial responses as
            newline-delimited JSON. When false, returns a single
            response object.
          default: true
        think:
          description: >-
            When true, returns separate thinking output in addition to
            the generated content. Can also be set to a string value
            to control thinking verbosity.
          oneOf:
            - type: boolean
            - type: string
              enum:
                - high
                - medium
                - low
        keep_alive:
          description: >-
            How long the model stays loaded in memory after the request.
          oneOf:
            - type: string
            - type: number
        options:
          $ref: '#/components/schemas/ModelOptions'
        logprobs:
          type: boolean
          description: >-
            Whether to return log probabilities of the output tokens.
        top_logprobs:
          type: integer
          description: >-
            Number of most likely tokens to return at each token
            position.
          minimum: 0

    ChatResponse:
      type: object
      description: >-
        Response object from a chat completion request. When streaming,
        partial objects are returned until done is true.
      properties:
        model:
          type: string
          description: >-
            The model used to generate the chat response.
        created_at:
          type: string
          format: date-time
          description: >-
            The ISO 8601 timestamp when the response was created.
        message:
          $ref: '#/components/schemas/ChatMessage'
        done:
          type: boolean
          description: >-
            Indicates whether the chat response has finished.
        done_reason:
          type: string
          description: >-
            The reason the generation stopped.
        total_duration:
          type: integer
          description: >-
            Total time spent generating the response in nanoseconds.
        load_duration:
          type: integer
          description: >-
            Time spent loading the model in nanoseconds.
        prompt_eval_count:
          type: integer
          description: >-
            Number of tokens in the prompt that were evaluated.
        prompt_eval_duration:
          type: integer
          description: >-
            Time spent evaluating the prompt in nanoseconds.
        eval_count:
          type: integer
          description: >-
            Number of tokens generated in the response.
        eval_duration:
          type: integer
          description: >-
            Time spent generating output tokens in nanoseconds.
        logprobs:
          type: array
          description: >-
            Log probability information for generated tokens.
          items:
            $ref: '#/components/schemas/Logprob'

    ChatMessage:
      type: object
      description: >-
        A message in a chat conversation, containing a role, content,
        and optional images or tool calls.
      required:
        - role
        - content
      properties:
        role:
          type: string
          description: >-
            The role of the message sender.
          enum:
            - system
            - user
            - assistant
            - tool
        content:
          type: string
          description: >-
            The text content of the message.
        thinking:
          type: string
          description: >-
            The thinking content when extended thinking is enabled.
        images:
          type: array
          description: >-
            A list of base64-encoded images attached to the message
            for multimodal models.
          items:
            type: string
            format: byte
        tool_calls:
          type: array
          description: >-
            Tool calls requested by the assistant for function calling.
          items:
            $ref: '#/components/schemas/ToolCall'

    ToolCall:
      type: object
      description: >-
        A tool call requested by the model during function calling.
      properties:
        function:
          type: object
          description: >-
            The function to call with its name and arguments.
          properties:
            name:
              type: string
              description: >-
                The name of the function to call.
            arguments:
              type: object
              description: >-
                The arguments to pass to the function as key-value
                pairs.
              additionalProperties: true

    ToolDefinition:
      type: object
      description: >-
        A definition of a tool that the model may call during
        conversation for function calling.
      required:
        - type
        - function
      properties:
        type:
          type: string
          description: >-
            The type of tool. Currently only function is supported.
          enum:
            - function
        function:
          type: object
          description: >-
            The function definition including name, description,
            and parameter schema.
          required:
            - name
          properties:
            name:
              type: string
              description: >-
                The name of the function.
            description:
              type: string
              description: >-
                A description of what the function does.
            parameters:
              type: object
              description: >-
                A JSON Schema object defining the function parameters.
              additionalProperties: true

    EmbedRequest:
      type: object
      description: >-
        Request body for generating vector embeddings from text.
      required:
        - model
        - input
      properties:
        model:
          type: string
          description: >-
            The name of the model to use for embedding generation.
        input:
          description: >-
            The text to generate embeddings for. Can be a single string
            or an array of strings for batch processing.
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        truncate:
          type: boolean
          description: >-
            If true, truncates inputs that exceed the model's context
            window. If false, returns an error for oversized inputs.
          default: true
        dimensions:
          type: integer
          description: >-
            The number of dimensions for the output embeddings. Only
            supported by models that allow dimension reduction.
        keep_alive:
          description: >-
            How long the model stays loaded in memory after the request.
          oneOf:
            - type: string
            - type: number
        options:
          $ref: '#/components/schemas/ModelOptions'

    EmbedResponse:
      type: object
      description: >-
        Response object from an embedding generation request containing
        the computed vectors.
      properties:
        model:
          type: string
          description: >-
            The model that produced the embeddings.
        embeddings:
          type: array
          description: >-
            The array of embedding vectors, one per input text.
          items:
            type: array
            items:
              type: number
        total_duration:
          type: integer
          description: >-
            Total time spent generating embeddings in nanoseconds.
        load_duration:
          type: integer
          description: >-
            Time spent loading the model in nanoseconds.
        prompt_eval_count:
          type: integer
          description: >-
            Number of input tokens processed to generate the embeddings.

    ListResponse:
      type: object
      description: >-
        Response containing a list of all locally available models.
      properties:
        models:
          type: array
          description: >-
            The list of available models.
          items:
            $ref: '#/components/schemas/ModelSummary'

    ModelSummary:
      type: object
      description: >-
        Summary information about a locally available model.
      properties:
        name:
          type: string
          description: >-
            The model name identifier.
        model:
          type: string
          description: >-
            The model identifier.
        remote_model:
          type: string
          description: >-
            The upstream model name if the model is a remote reference.
        remote_host:
          type: string
          description: >-
            The upstream Ollama server URL if the model is remote.
        modified_at:
          type: string
          format: date-time
          description: >-
            The ISO 8601 timestamp when the model was last modified.
        size:
          type: integer
          description: >-
            The model size in bytes on disk.
        digest:
          type: string
          description: >-
            The SHA256 hash of the model contents.
        details:
          $ref: '#/components/schemas/ModelDetails'

    ModelDetails:
      type: object
      description: >-
        Detailed metadata about a model's format and architecture.
      properties:
        format:
          type: string
          description: >-
            The file format of the model, such as gguf.
        family:
          type: string
          description: >-
            The primary model family, such as llama or gemma.
        families:
          type: array
          description: >-
            All model families this model belongs to.
          items:
            type: string
        parameter_size:
          type: string
          description: >-
            The parameter count label, such as 7B or 13B.
        quantization_level:
          type: string
          description: >-
            The quantization method used, such as Q4_0 or Q4_K_M.

    ShowRequest:
      type: object
      description: >-
        Request body for retrieving detailed model information.
      required:
        - model
      properties:
        model:
          type: string
          description: >-
            The name of the model to show information for.
        verbose:
          type: boolean
          description: >-
            When true, returns additional verbose metadata fields.

    ShowResponse:
      type: object
      description: >-
        Detailed information about a model including its configuration,
        capabilities, and metadata.
      properties:
        modelfile:
          type: string
          description: >-
            The Modelfile content used to create this model.
        parameters:
          type: string
          description: >-
            The model parameters in string format.
        template:
          type: string
          description: >-
            The prompt template used by the model.
        system:
          type: string
          description: >-
            The system prompt embedded in the model.
        license:
          type: string
          description: >-
            The license text for the model.
        details:
          $ref: '#/components/schemas/ModelDetails'
        model_info:
          type: object
          description: >-
            Additional model metadata and architecture information.
          additionalProperties: true
        capabilities:
          type: array
          description: >-
            The list of capabilities the model supports, such as
            completion, tools, vision, and thinking.
          items:
            type: string

    CreateRequest:
      type: object
      description: >-
        Request body for creating a new model from an existing model
        with optional customizations.
      required:
        - model
      properties:
        model:
          type: string
          description: >-
            The name for the new model to create.
        from:
          type: string
          description: >-
            The existing model to use as a base for the new model.
        system:
          type: string
          description: >-
            A system prompt to embed in the new model.
        template:
          type: string
          description: >-
            A custom prompt template for the new model.
        license:
          description: >-
            License text or list of licenses for the new model.
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        parameters:
          type: object
          description: >-
            Key-value parameters to set on the new model, such as
            temperature, top_k, and num_ctx.
          additionalProperties: true
        messages:
          type: array
          description: >-
            A message history to include with the new model.
          items:
            $ref: '#/components/schemas/ChatMessage'
        quantize:
          type: string
          description: >-
            The quantization level to apply to the model, such as
            q4_K_M or q8_0.
        stream:
          type: boolean
          description: >-
            When true, streams progress status events during creation.
          default: true

    CopyRequest:
      type: object
      description: >-
        Request body for copying an existing model to a new name.
      required:
        - source
        - destination
      properties:
        source:
          type: string
          description: >-
            The name of the existing model to copy from.
        destination:
          type: string
          description: >-
            The name for the new model copy.

    PullRequest:
      type: object
      description: >-
        Request body for downloading a model from the registry.
      required:
        - model
      properties:
        model:
          type: string
          description: >-
            The name of the model to download from the registry.
        stream:
          type: boolean
          description: >-
            When true, streams progress status events during download.
          default: true
        insecure:
          type: boolean
          description: >-
            When true, allows downloading from registries using
            insecure HTTP connections.

    PushRequest:
      type: object
      description: >-
        Request body for uploading a model to the registry.
      required:
        - model
      properties:
        model:
          type: string
          description: >-
            The name of the model to upload to the registry.
        stream:
          type: boolean
          description: >-
            When true, streams progress status events during upload.
          default: true
        insecure:
          type: boolean
          description: >-
            When true, allows uploading to registries using insecure
            HTTP connections.

    DeleteRequest:
      type: object
      description: >-
        Request body for deleting a model from the local server.
      required:
        - model
      properties:
        model:
          type: string
          description: >-
            The name of the model to delete.

    PsResponse:
      type: object
      description: >-
        Response containing a list of models currently loaded in memory.
      properties:
        models:
          type: array
          description: >-
            The list of currently running models.
          items:
            $ref: '#/components/schemas/RunningModel'

    RunningModel:
      type: object
      description: >-
        Information about a model currently loaded in memory.
      properties:
        name:
          type: string
          description: >-
            The model name identifier.
        model:
          type: string
          description: >-
            The model identifier.
        size:
          type: integer
          description: >-
            The model size in bytes.
        digest:
          type: string
          description: >-
            The SHA256 hash of the model contents.
        details:
          $ref: '#/components/schemas/ModelDetails'
        expires_at:
          type: string
          format: date-time
          description: >-
            The timestamp when the model will be unloaded from memory.
        size_vram:
          type: integer
          description: >-
            The amount of VRAM consumed by the model in bytes.
        context_length:
          type: integer
          description: >-
            The maximum context window length supported.

    StatusResponse:
      type: object
      description: >-
        A status response returned for non-streaming model operations.
      properties:
        status:
          type: string
          description: >-
            The current status message.

    StatusEvent:
      type: object
      description: >-
        A streaming status event returned during model creation,
        pull, or push operations.
      properties:
        status:
          type: string
          description: >-
            A human-readable status message describing the current
            operation step.
        digest:
          type: string
          description: >-
            The content digest associated with the current status,
            if applicable.
        total:
          type: integer
          description: >-
            The total number of bytes expected for the operation.
        completed:
          type: integer
          description: >-
            The number of bytes transferred so far.

    VersionResponse:
      type: object
      description: >-
        Response containing the Ollama server version.
      properties:
        version:
          type: string
          description: >-
            The version string of the Ollama server.

    ModelOptions:
      type: object
      description: >-
        Runtime options that control text generation behavior.
        These override the model's default parameter values.
      properties:
        seed:
          type: integer
          description: >-
            Random seed for reproducible generation. Set to a specific
            value for deterministic output.
        temperature:
          type: number
          description: >-
            Controls the creativity of responses. Higher values produce
            more varied output. Range 0.0 to 2.0.
          minimum: 0.0
          maximum: 2.0
        top_k:
          type: integer
          description: >-
            Limits token selection to the top K most probable tokens.
            Lower values produce more focused output.
          minimum: 0
        top_p:
          type: number
          description: >-
            Nucleus sampling probability cutoff. Limits selection to
            the smallest set of tokens whose cumulative probability
            exceeds this value.
          minimum: 0.0
          maximum: 1.0
        min_p:
          type: number
          description: >-
            Minimum probability threshold relative to the most likely
            token. Tokens below this threshold are filtered out.
          minimum: 0.0
          maximum: 1.0
        stop:
          type: array
          description: >-
            A list of stop sequences. Generation halts when any of
            these strings are produced.
          items:
            type: string
        num_ctx:
          type: integer
          description: >-
            The maximum context window size in tokens.
        num_predict:
          type: integer
          description: >-
            The maximum number of tokens to generate in the response.
        repeat_penalty:
          type: number
          description: >-
            Penalty applied to repeated tokens to reduce repetition.
        repeat_last_n:
          type: integer
          description: >-
            Number of recent tokens to consider for repeat penalty.
        tfs_z:
          type: number
          description: >-
            Tail-free sampling parameter. Higher values reduce the
            impact of less probable tokens.
        mirostat:
          type: integer
          description: >-
            Enable Mirostat sampling for perplexity control. 0 is
            disabled, 1 uses Mirostat, 2 uses Mirostat 2.0.
          enum:
            - 0
            - 1
            - 2
        mirostat_tau:
          type: number
          description: >-
            Target entropy for Mirostat sampling.
        mirostat_eta:
          type: number
          description: >-
            Learning rate for Mirostat sampling.

    Logprob:
      type: object
      description: >-
        Log probability information for a generated token.
      properties:
        token:
          type: string
          description: >-
            The token text.
        logprob:
          type: number
          description: >-
            The log probability of the token.
        bytes:
          type: array
          description: >-
            The byte representation of the token.
          items:
            type: integer
        top_logprobs:
          type: array
          description: >-
            The most likely alternative tokens and their log
            probabilities at this position.
          items:
            type: object
            properties:
              token:
                type: string
                description: >-
                  The alternative token text.
              logprob:
                type: number
                description: >-
                  The log probability of the alternative token.
              bytes:
                type: array
                description: >-
                  The byte representation of the alternative token.
                items:
                  type: integer

    ErrorResponse:
      type: object
      description: >-
        An error response returned when a request fails.
      properties:
        error:
          type: string
          description: >-
            A human-readable error message describing the problem.
