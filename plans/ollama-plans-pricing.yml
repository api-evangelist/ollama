specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Ollama
providerId: ollama
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Artificial Intelligence
  - Large Language Models
  - Models
description: Ollama is free and open-source for local inference (no auth, no charge, no rate limit on
  http://localhost:11434). Ollama Cloud is a hosted-inference add-on with three tiers (Free, Pro, Max),
  measured by GPU utilization rather than tokens. Cloud usage resets on a 5-hour session and 7-day weekly
  cycle. All tiers permit unlimited use of open models on the user's own hardware; tier differences apply
  only to ollama.com cloud-model concurrency and weekly cloud usage.
sources:
  - https://ollama.com/pricing
  - https://docs.ollama.com/cloud
  - https://docs.ollama.com/api/authentication
plans:
  - id: ollama-local
    name: Local
    type: freemium
    description: Run Ollama on your own hardware. Open source. No account or API key required for the
      local server at http://localhost:11434.
    entries:
      - label: Local inference
        name: local_inference
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        domains:
          - http://localhost:11434/api
          - http://localhost:11434/v1
          - http://localhost:11434
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Unlimited local inference
      - name: Open-source models
      - name: No authentication required for localhost
      - name: Ollama API
      - name: Ollama OpenAI Compatibility API
      - name: Ollama Anthropic Compatibility API
  - id: ollama-cloud-free
    name: Cloud — Free
    type: freemium
    description: Free hosted inference at ollama.com. Requires an ollama.com account and API key. Cloud
      usage is metered by GPU time, not tokens.
    entries:
      - label: Cloud monthly fee
        name: cloud_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://ollama.com/api
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Cloud GPU usage (basic limits, 5-hour session / 7-day weekly cycle)
        name: cloud_usage
        type: quota
        metric: gpu_time
        limit: see ollama.com (basic free quota)
        timeFrame: week
        geo: global
        domains:
          - https://ollama.com/api
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Run cloud models from CLI/API
      - name: Unlimited public models
      - name: Run models on your own hardware
      - name: Ollama Cloud API
  - id: ollama-cloud-pro
    name: Cloud — Pro
    type: subscription
    description: $20/month or $200/year. Run 3 cloud models at a time; 50x more cloud usage than Free.
    entries:
      - label: Monthly subscription
        name: pro_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://ollama.com/api
        unit: 1
        price: '20.00'
        userMultiplied: false
      - label: Annual subscription
        name: pro_annual
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: global
        domains:
          - https://ollama.com/api
        unit: 1
        price: '200.00'
        userMultiplied: false
      - label: Concurrent cloud models
        name: pro_concurrent
        type: quota
        metric: concurrent_models
        limit: 3
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: 3 concurrent cloud models
      - name: 50x cloud usage of Free
      - name: Ollama Cloud API
  - id: ollama-cloud-max
    name: Cloud — Max
    type: subscription
    description: $100/month. Run 10 cloud models at a time; 5x more usage than Pro.
    entries:
      - label: Monthly subscription
        name: max_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://ollama.com/api
        unit: 1
        price: '100.00'
        userMultiplied: false
      - label: Concurrent cloud models
        name: max_concurrent
        type: quota
        metric: concurrent_models
        limit: 10
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: 10 concurrent cloud models
      - name: 5x cloud usage of Pro
      - name: Ollama Cloud API
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
