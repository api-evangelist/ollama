specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Ollama
providerId: ollama
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Artificial Intelligence
  - Large Language Models
  - Models
  - Rate Limiting
description: Local Ollama (http://localhost:11434) has no rate limits or authentication. Ollama Cloud
  enforces tier-based concurrency (Free, Pro=3, Max=10 concurrent cloud models) and weekly GPU-time quotas
  rather than per-second request ceilings. Cloud quotas reset on 5-hour session and 7-day weekly cycles.
  Specific TPS / RPM ceilings are not publicly documented.
sources:
  - https://ollama.com/pricing
  - https://docs.ollama.com/cloud
  - https://docs.ollama.com/api/authentication
responseCodes:
  unauthorized: 401
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Local server
    scope: localhost
    metric: requests_per_second
    limit: unlimited (bounded by local hardware)
    notes: No auth, no rate limiting on http://localhost:11434.
    applies:
      - Ollama API
      - Ollama OpenAI Compatibility API
      - Ollama Anthropic Compatibility API
  - name: Cloud — concurrent models (Free)
    scope: account
    metric: concurrent_requests
    limit: 1
    notes: Free tier permits running cloud models with basic limits.
    applies:
      - Ollama Cloud API
  - name: Cloud — concurrent models (Pro)
    scope: account
    metric: concurrent_requests
    limit: 3
    notes: Pro tier permits 3 cloud models at a time.
    applies:
      - Ollama Cloud API
  - name: Cloud — concurrent models (Max)
    scope: account
    metric: concurrent_requests
    limit: 10
    notes: Max tier permits 10 cloud models at a time.
    applies:
      - Ollama Cloud API
  - name: Cloud — weekly GPU usage
    scope: account
    metric: gpu_time
    limit: tier-dependent (Free baseline, Pro = 50x Free, Max = 5x Pro)
    timeFrame: week
    notes: Quota resets on 5-hour session and 7-day weekly windows.
    applies:
      - Ollama Cloud API
policies:
  - name: Authentication
    description: Local server requires no auth. Cloud requires an ollama.com account; pass the API key
      via the OLLAMA_API_KEY env var or Authorization Bearer header.
  - name: Backoff
    description: On 429 from cloud, back off and retry; honor Retry-After if present.
  - name: Privacy
    description: 'Ollama states cloud prompt/response data is never logged or trained on; cloud inference
      runs primarily in US data centers, with EU/Singapore routing for capacity.'
  - name: Hybrid scheduling
    description: Cloud models can be invoked transparently from a local Ollama instance via signed-in
      cloud access; routing to localhost vs ollama.com is selected per-request by model name.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
