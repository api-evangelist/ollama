      - method: POST
        name: copymodel
        description: Ollama Copy a model
        call: ollama.copymodel
        outputParameters:
        - type: object
          mapping: $.
    - path: /api/pull
      name: pullmodel
      operations:
      - method: POST
        name: pullmodel
        description: Ollama Pull a model
        call: ollama.pullmodel
        outputParameters:
        - type: object
          mapping: $.
    - path: /api/push
      name: pushmodel
      operations:
      - method: POST
        name: pushmodel
        description: Ollama Push a model
        call: ollama.pushmodel
        outputParameters:
        - type: object
          mapping: $.
    - path: /api/delete
      name: deletemodel
      operations:
      - method: DELETE
        name: deletemodel
        description: Ollama Delete a model
        call: ollama.deletemodel
        outputParameters:
        - type: object
          mapping: $.
    - path: /api/ps
      name: listrunningmodels
      operations:
      - method: GET
        name: listrunningmodels
        description: Ollama List running models
        call: ollama.listrunningmodels
        outputParameters:
        - type: object
          mapping: $.
    - path: /api/blobs/{digest}
      name: createblob
      operations:
      - method: POST
        name: createblob
        description: Ollama Create a blob
        call: ollama.createblob
        outputParameters:
