naftiko: 1.0.0-alpha2
info:
  label: Ollama API
  description: Ollama provides a REST API for running and managing large language models locally. The API supports text generation,
    chat completions, embeddings, model management, and streaming responses. It serves as the primary interface for interacting
    with models running on the Ollama inference engine at localhost:11434.
  tags:
  - Ollama
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: ollama
    baseUri: http://localhost:11434
    description: Ollama API HTTP API.
    resources:
    - name: api-generate
      path: /api/generate
      operations:
      - name: generatecompletion
        method: POST
        description: Ollama Generate a completion
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-chat
      path: /api/chat
      operations:
      - name: generatechatcompletion
        method: POST
        description: Ollama Generate a chat completion
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-embed
      path: /api/embed
      operations:
      - name: generateembeddings
        method: POST
        description: Ollama Generate embeddings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-tags
      path: /api/tags
      operations:
      - name: listmodels
        method: GET
        description: Ollama List local models
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-show
      path: /api/show
      operations:
      - name: showmodelinfo
        method: POST
        description: Ollama Show model information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-create
      path: /api/create
      operations:
      - name: createmodel
        method: POST
        description: Ollama Create a model
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-copy
      path: /api/copy
      operations:
      - name: copymodel
        method: POST
        description: Ollama Copy a model
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-pull
      path: /api/pull
      operations:
      - name: pullmodel
        method: POST
        description: Ollama Pull a model
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-push
      path: /api/push
      operations:
      - name: pushmodel
        method: POST
        description: Ollama Push a model
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-delete
      path: /api/delete
      operations:
      - name: deletemodel
        method: DELETE
        description: Ollama Delete a model
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-ps
      path: /api/ps
      operations:
      - name: listrunningmodels
        method: GET
        description: Ollama List running models
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-blobs-digest
      path: /api/blobs/{digest}
      operations:
      - name: createblob
        method: POST
        description: Ollama Create a blob
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-version
      path: /api/version
      operations:
      - name: getversion
        method: GET
        description: Get Ollama version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: ollama-rest
    description: REST adapter for Ollama API.
    resources:
    - path: /api/generate
      name: generatecompletion
      operations:
      - method: POST
        name: generatecompletion
        description: Ollama Generate a completion
        call: ollama.generatecompletion
        outputParameters:
        - type: object
          mapping: $.
    - path: /api/chat
      name: generatechatcompletion
      operations:
      - method: POST
        name: generatechatcompletion
        description: Ollama Generate a chat completion
        call: ollama.generatechatcompletion
        outputParameters:
        - type: object
          mapping: $.
    - path: /api/embed
      name: generateembeddings
      operations:
      - method: POST
        name: generateembeddings
        description: Ollama Generate embeddings
        call: ollama.generateembeddings
        outputParameters:
        - type: object
          mapping: $.
    - path: /api/tags
      name: listmodels
      operations:
      - method: GET
        name: listmodels
        description: Ollama List local models
        call: ollama.listmodels
        outputParameters:
        - type: object
          mapping: $.
    - path: /api/show
      name: showmodelinfo
      operations:
