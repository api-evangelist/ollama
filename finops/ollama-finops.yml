specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Ollama
providerId: ollama
publisherName: Ollama Inc.
serviceCategory: AI Infrastructure
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Artificial Intelligence
  - Large Language Models
  - Models
  - FinOps
  - Cost Management
  - FOCUS
description: 'FOCUS-aligned FinOps for Ollama: local inference is free and self-hosted; Ollama Cloud is
  a tiered subscription priced on GPU utilization rather than tokens, with concurrency caps per tier.'
sources:
  - https://ollama.com/pricing
  - https://docs.ollama.com/cloud
  - https://docs.ollama.com/api/authentication
principles:
  - name: Visibility
    description: For local Ollama, track GPU/CPU utilization and electricity cost as the unit cost. For
      Ollama Cloud, track concurrent model count and weekly GPU-time budget on the ollama.com dashboard;
      Ollama does not charge per token.
  - name: Allocation
    description: Allocate Ollama Cloud subscriptions per developer or team (one Pro/Max per active developer).
      For self-hosted GPUs, allocate the inference server's amortized hardware + power cost across consuming
      products by tagged request metadata.
  - name: Optimization
    description: Run common, latency-tolerant inference locally; reserve cloud (Pro/Max) for large models
      that exceed local VRAM (e.g. gpt-oss:120b-cloud). Right-size the tier — Pro at $20/mo replaces ad-hoc
      large-model rentals; Max at $100/mo only when sustained 10x concurrency is needed.
  - name: Accountability
    description: Designate a per-team owner for each Ollama Cloud account. Review weekly cloud GPU-time
      consumption against the tier; downgrade to Free if Cloud is dormant. For self-hosted, the platform
      team owns hardware utilization targets.
billingModel:
  pricingCategory: Subscription (Tiered) + Self-Hosted Free
  billingFrequency: Monthly or Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Credit
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Ollama
  ServiceCategory: AI Infrastructure
  ProviderName: Ollama
  PublisherName: Ollama Inc.
  InvoiceIssuerName: Ollama Inc.
  PricingCategory: Subscription
  PricingUnit: month
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: cloud_subscription
    description: Per-account Ollama Cloud subscription (Free, Pro, Max)
    unit: month
    aggregation: sum
    dimensions:
      - tier
      - billing_cycle
  - name: cloud_gpu_time
    description: GPU time consumed on Ollama Cloud (the actual consumption meter)
    unit: gpu-second
    aggregation: sum
    dimensions:
      - model
      - region
  - name: cloud_concurrent_models
    description: Peak concurrent cloud model count (used to size tier)
    unit: model
    aggregation: max
    dimensions:
      - account
  - name: local_inference_requests
    description: Local Ollama requests (no charge from Ollama; cost is hardware/power)
    unit: request
    aggregation: sum
    dimensions:
      - model
      - host
apis:
  - name: Ollama API
    baseURL: http://localhost:11434/api
    tags:
      - Inference
      - Large Language Models
      - Local AI
    serviceName: Ollama API
    serviceCategory: AI Infrastructure
  - name: Ollama OpenAI Compatibility API
    baseURL: http://localhost:11434/v1
    tags:
      - Chat
      - Compatibility
      - OpenAI
    serviceName: Ollama OpenAI Compatibility API
    serviceCategory: AI Infrastructure
  - name: Ollama Anthropic Compatibility API
    baseURL: http://localhost:11434
    tags:
      - Anthropic
      - Chat
      - Compatibility
    serviceName: Ollama Anthropic Compatibility API
    serviceCategory: AI Infrastructure
  - name: Ollama Cloud API
    baseURL: https://ollama.com/api
    tags:
      - Cloud
      - Inference
    serviceName: Ollama Cloud API
    serviceCategory: AI Infrastructure
unitEconomics:
  - name: Cloud cost per active developer
    metric: cloud_subscription_cost / active_developers_using_cloud
    target: '$20-100/mo per developer based on tier'
  - name: Local cost per inference
    metric: (gpu_amortization + electricity) / local_inference_requests
    target: minimize via batching
  - name: Cloud GPU-time efficiency
    metric: cloud_gpu_time / cloud_useful_completions
    target: monitor weekly against tier ceiling
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
