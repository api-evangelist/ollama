  description: >-
    Ollama provides a REST API for running and managing large language models
    locally. The API supports text generation, chat completions, embeddings,
    model management, and streaming responses. It serves as the primary
    interface for interacting with models running on the Ollama inference
    engine at localhost:11434.
- aid: ollama:ollama-openai-compatibility-api
  name: Ollama OpenAI Compatibility API
  tags:
  - OpenAI
  - Compatibility
  - Large Language Models
  - Chat
  humanURL: https://docs.ollama.com/api/openai-compatibility
  baseURL: http://localhost:11434/v1
  properties:
  - url: https://docs.ollama.com/api/openai-compatibility
    type: Documentation
  - url: https://ollama.com/blog/openai-compatibility
    type: Blog
  description: >-
    Ollama provides compatibility with parts of the OpenAI API, allowing
    existing applications built for OpenAI to connect to locally-running
    models through Ollama. Supported endpoints include chat completions,
    completions, embeddings, models, and the Responses API.
- aid: ollama:ollama-anthropic-compatibility-api
  name: Ollama Anthropic Compatibility API
  tags:
  - Anthropic
  - Compatibility
  - Large Language Models
  - Chat
  humanURL: https://docs.ollama.com/api/anthropic-compatibility
  baseURL: http://localhost:11434
  properties:
  - url: https://docs.ollama.com/api/anthropic-compatibility
    type: Documentation
  - url: https://ollama.com/blog/claude
    type: Blog
  description: >-
    Ollama provides compatibility with the Anthropic Messages API, enabling
    tools like Claude Code to work with locally-running open-source models.
    Supports messages, streaming, system prompts, tool calling, extended
    thinking, and vision input.
- aid: ollama:ollama-cloud-api
  name: Ollama Cloud API
  tags:
  - Cloud
  - Large Language Models
  - Inference
  humanURL: https://docs.ollama.com/cloud
  baseURL: https://ollama.com/api
  properties:
  - url: https://docs.ollama.com/cloud
    type: Documentation
  - url: https://ollama.com/cloud
    type: Getting Started
  - url: https://ollama.com/pricing
    type: Pricing
  - url: https://ollama.com/settings/keys
    type: Authentication
  - url: https://ollama.com/search?c=cloud
    type: Models
  description: >-
    Ollama Cloud provides cloud-hosted inference for large language models,
    giving access to larger models and faster responses without requiring a
    powerful local GPU. Cloud models are accessed through the same API
    interface as local models, with requests encrypted in transit and no
    storage of prompts or outputs.
